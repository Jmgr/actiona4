name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tooling-linux:
    name: Linux Tooling
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Linux cargo tools cache
        id: cache-linux-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-derivefmt
            ~/.cargo/bin/cargo-sort
            ~/.cargo/bin/dump_syms
          key: cargo-tools-linux-v5-${{ hashFiles('rust-toolchain.toml') }}

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Install cargo-derivefmt
        run: |
          if ! command -v cargo-derivefmt >/dev/null 2>&1; then
            cargo install --locked --git https://github.com/dcchut/cargo-derivefmt --bin cargo-derivefmt
          fi

      - name: Install cargo-sort
        run: |
          if ! command -v cargo-sort >/dev/null 2>&1; then
            cargo install --locked cargo-sort
          fi

      - name: Install dump_syms
        run: |
          if ! command -v dump_syms >/dev/null 2>&1; then
            cargo install --locked dump_syms
          fi

      - name: Save Linux cargo tools cache
        if: ${{ success() && steps.cache-linux-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-derivefmt
            ~/.cargo/bin/cargo-sort
            ~/.cargo/bin/dump_syms
          key: ${{ steps.cache-linux-tools.outputs.cache-primary-key }}

      - name: Archive Linux cargo tools
        run: |
          tar -C ~/.cargo/bin -cf "${RUNNER_TEMP}/cargo-tools-linux.tar" \
            cargo-make \
            cargo-derivefmt \
            cargo-sort \
            dump_syms

      - name: Upload Linux cargo tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: cargo-tools-linux
          path: ${{ runner.temp }}/cargo-tools-linux.tar
          retention-days: 1

  tooling-windows:
    name: Windows Tooling
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Windows cargo tools cache
        id: cache-windows-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
          key: cargo-tools-windows-v5-${{ hashFiles('rust-toolchain.toml') }}

      - name: Install cargo-make
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-make -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-make
          }

      - name: Install dump_syms
        shell: pwsh
        run: |
          if (-not (Get-Command dump_syms -ErrorAction SilentlyContinue)) {
            cargo install --locked dump_syms
          }

      - name: Save Windows cargo tools cache
        if: ${{ success() && steps.cache-windows-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
          key: ${{ steps.cache-windows-tools.outputs.cache-primary-key }}

      - name: Prepare Windows cargo tools artifact
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:RUNNER_TEMP "cargo-tools-windows"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item "$HOME\.cargo\bin\cargo-make.exe" $artifactDir -Force
          Copy-Item "$HOME\.cargo\bin\dump_syms.exe" $artifactDir -Force

      - name: Upload Windows cargo tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: cargo-tools-windows
          path: ${{ runner.temp }}\cargo-tools-windows
          retention-days: 1

  format:
    name: Format
    runs-on: ubuntu-24.04
    needs: tooling-linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly rustfmt
        run: rustup component add rustfmt --toolchain nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Download Linux cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-linux
          path: ${{ runner.temp }}

      - name: Install Linux cargo tools artifact
        run: |
          mkdir -p ~/.cargo/bin
          tar -xf "${RUNNER_TEMP}/cargo-tools-linux.tar" -C ~/.cargo/bin

      - name: Run format check
        run: cargo make format-check

  linux-lint:
    name: Linux Lint
    runs-on: ubuntu-24.04
    needs:
      - format
      - tooling-linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-lint

      - name: Download Linux cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-linux
          path: ${{ runner.temp }}

      - name: Install Linux cargo tools artifact
        run: |
          mkdir -p ~/.cargo/bin
          tar -xf "${RUNNER_TEMP}/cargo-tools-linux.tar" -C ~/.cargo/bin

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Run lint
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make lint

  windows-lint:
    name: Windows Lint
    runs-on: windows-latest
    needs:
      - format
      - tooling-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: windows-lint

      - name: Download Windows cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-windows
          path: ${{ runner.temp }}\cargo-tools-windows

      - name: Install Windows cargo tools artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.cargo\bin" | Out-Null
          Copy-Item "$env:RUNNER_TEMP\cargo-tools-windows\*" "$HOME\.cargo\bin\" -Force

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Run lint
        run: cargo make lint

  doc:
    name: Docs
    runs-on: ubuntu-24.04
    needs:
      - linux-lint
      - windows-lint
      - tooling-linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Download Linux cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-linux
          path: ${{ runner.temp }}

      - name: Install Linux cargo tools artifact
        run: |
          mkdir -p ~/.cargo/bin
          tar -xf "${RUNNER_TEMP}/cargo-tools-linux.tar" -C ~/.cargo/bin

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Build docs
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make doc

  linux-test:
    name: Linux Test
    runs-on: ubuntu-24.04
    needs: doc

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-test

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          extra-packages: xvfb

      - name: Run tests
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: xvfb-run -a -s "-screen 0 1920x1080x24" cargo test --locked --workspace --exclude e2e

  windows-test:
    name: Windows Test
    runs-on: windows-latest
    needs: doc

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: windows-test

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Run tests
        run: cargo test --locked --workspace --exclude e2e --features run/windows-bin -- --test-threads=1

  linux-e2e:
    name: Linux E2E
    runs-on: ubuntu-24.04
    needs:
      - doc
      - tooling-linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-e2e

      - name: Download Linux cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-linux
          path: ${{ runner.temp }}

      - name: Install Linux cargo tools artifact
        run: |
          mkdir -p ~/.cargo/bin
          tar -xf "${RUNNER_TEMP}/cargo-tools-linux.tar" -C ~/.cargo/bin

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          extra-packages: xvfb openbox

      - name: Run e2e tests
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: xvfb-run -a -s "-screen 0 1920x1080x24" bash -c "openbox &>/dev/null & sleep 1 && cargo make e2e"

  windows-e2e:
    name: Windows E2E
    runs-on: windows-latest
    needs:
      - doc
      - tooling-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: windows-e2e

      - name: Download Windows cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-windows
          path: ${{ runner.temp }}\cargo-tools-windows

      - name: Install Windows cargo tools artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.cargo\bin" | Out-Null
          Copy-Item "$env:RUNNER_TEMP\cargo-tools-windows\*" "$HOME\.cargo\bin\" -Force

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Run e2e tests
        run: cargo make e2e

  appimage:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    needs:
      - linux-test
      - windows-test
      - tooling-linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-release

      - name: Download Linux cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-linux
          path: ${{ runner.temp }}

      - name: Install Linux cargo tools artifact
        run: |
          mkdir -p ~/.cargo/bin
          tar -xf "${RUNNER_TEMP}/cargo-tools-linux.tar" -C ~/.cargo/bin

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Build unsigned AppImage
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make appimage-nosign

  windows-archive:
    name: Windows Archive
    runs-on: windows-latest
    needs:
      - linux-test
      - windows-test
      - tooling-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: windows-release

      - name: Download Windows cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-windows
          path: ${{ runner.temp }}\cargo-tools-windows

      - name: Install Windows cargo tools artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.cargo\bin" | Out-Null
          Copy-Item "$env:RUNNER_TEMP\cargo-tools-windows\*" "$HOME\.cargo\bin\" -Force

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Build unsigned archive
        run: cargo make archive-nosign

  windows-installer:
    name: Windows Installer
    runs-on: windows-latest
    needs:
      - linux-test
      - windows-test
      - tooling-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows x86 target
        run: rustup target add i686-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: windows-release

      - name: Download Windows cargo tools artifact
        uses: actions/download-artifact@v8
        with:
          name: cargo-tools-windows
          path: ${{ runner.temp }}\cargo-tools-windows

      - name: Install Windows cargo tools artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.cargo\bin" | Out-Null
          Copy-Item "$env:RUNNER_TEMP\cargo-tools-windows\*" "$HOME\.cargo\bin\" -Force

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Build unsigned installer
        run: cargo make installer-nosign
