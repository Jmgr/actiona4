name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly rustfmt
        run: rustup component add rustfmt --toolchain nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo format tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-derivefmt
            ~/.cargo/bin/cargo-sort
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: cargo-format-tools-linux-v1-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-format-tools-linux-

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Install cargo-derivefmt
        run: |
          if ! command -v cargo-derivefmt >/dev/null 2>&1; then
            cargo install --locked --git https://github.com/dcchut/cargo-derivefmt --bin cargo-derivefmt
          fi

      - name: Install cargo-sort
        run: |
          if ! command -v cargo-sort >/dev/null 2>&1; then
            cargo install --locked cargo-sort
          fi

      - name: Run format check
        run: cargo make format-check

  linux:
    name: Linux
    runs-on: ubuntu-latest
    needs: format

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: cargo-tools-linux-v1-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-tools-linux-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            libasound2-dev \
            libcairo2-dev \
            libclang-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libgraphene-1.0-dev \
            libgtk-4-dev \
            libnotify-dev \
            libopencv-dev \
            libpango1.0-dev \
            libssl-dev \
            libstdc++-12-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-randr0-dev \
            libxdo-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxtst-dev \
            llvm-dev \
            mold \
            pkg-config \
            xvfb

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Install dump_syms
        run: |
          if ! command -v dump_syms >/dev/null 2>&1; then
            cargo install --locked dump_syms
          fi

      - name: Run lint
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make lint

      - name: Build docs
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make doc

      - name: Build release binaries
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make release

      - name: Build unsigned AppImage
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make appimage-nosign

      - name: Run tests
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: xvfb-run -a -s "-screen 0 1920x1080x24" cargo test --locked --workspace

  windows:
    name: Windows
    runs-on: windows-latest
    needs: format

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows x86 target
        run: rustup target add i686-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: cargo-tools-windows-v1-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-tools-windows-

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}\vcpkg
            ${{ github.workspace }}\vcpkg-downloads
            ${{ github.workspace }}\vcpkg-bincache
          key: vcpkg-windows-opencv4-v1
          restore-keys: |
            vcpkg-windows-opencv4-

      - name: Install cargo-make
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-make -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-make
          }

      - name: Install dump_syms
        shell: pwsh
        run: |
          if (-not (Get-Command dump_syms -ErrorAction SilentlyContinue)) {
            cargo install --locked dump_syms
          }

      - name: Install OpenCV with vcpkg
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-bincache,readwrite
          VCPKG_DOWNLOADS: ${{ github.workspace }}\vcpkg-downloads
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP vcpkg
          if (-not (Test-Path (Join-Path $vcpkgRoot vcpkg.exe))) {
            git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
            & (Join-Path $vcpkgRoot bootstrap-vcpkg.bat)
          }
          & (Join-Path $vcpkgRoot vcpkg.exe) install opencv4:x64-windows
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DOWNLOADS=$env:VCPKG_DOWNLOADS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENCV_VCPKG_NAME=opencv4" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $vcpkgRoot installed/x64-windows/bin) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run lint
        run: cargo make lint

      - name: Build release binaries
        run: cargo make release

      - name: Build unsigned archive
        run: cargo make archive-nosign

      - name: Build unsigned installer
        run: cargo make installer-nosign

      - name: Run tests
        run: cargo test --locked --workspace --features run/windows-bin
