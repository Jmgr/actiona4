name: Build

on:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rustflags: -C link-arg=-fuse-ld=mold
            test_command: xvfb-run -a -s "-screen 0 1920x1080x24" cargo test --locked --workspace
          - os: windows-latest
            rustflags: ""
            test_command: cargo test --locked --workspace --features run/windows-bin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-make
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: cargo-make-${{ runner.os }}-v1-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-make-${{ runner.os }}-

      - name: Cache vcpkg artifacts
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg-downloads
            ${{ github.workspace }}\vcpkg-bincache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            libasound2-dev \
            libcairo2-dev \
            libclang-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libgraphene-1.0-dev \
            libgtk-4-dev \
            libnotify-dev \
            libopencv-dev \
            libpango1.0-dev \
            libssl-dev \
            libstdc++-12-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-randr0-dev \
            libxdo-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxtst-dev \
            llvm-dev \
            mold \
            pkg-config \
            xvfb

      - name: Install cargo-make
        run: cargo install --locked cargo-make

      - name: Install OpenCV with vcpkg
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP vcpkg
          git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          & (Join-Path $vcpkgRoot bootstrap-vcpkg.bat)
          & (Join-Path $vcpkgRoot vcpkg.exe) install opencv4:x64-windows
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENCV_VCPKG_NAME=opencv4" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $vcpkgRoot installed/x64-windows/bin) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binaries
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo make release

      - name: Build selection tool
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo make release-selection

      - name: Run tests
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: ${{ matrix.test_command }}
