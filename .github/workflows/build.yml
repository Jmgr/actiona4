name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly rustfmt
        run: rustup component add rustfmt --toolchain nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Restore cargo format tools cache
        id: cache-format-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-derivefmt
            ~/.cargo/bin/cargo-sort
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: cargo-format-tools-linux-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/build.yml') }}
          restore-keys: |
            cargo-format-tools-linux-v2-

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Install cargo-derivefmt
        run: |
          if ! command -v cargo-derivefmt >/dev/null 2>&1; then
            cargo install --locked --git https://github.com/dcchut/cargo-derivefmt --bin cargo-derivefmt
          fi

      - name: Install cargo-sort
        run: |
          if ! command -v cargo-sort >/dev/null 2>&1; then
            cargo install --locked cargo-sort
          fi

      - name: Save cargo format tools cache
        if: ${{ success() && steps.cache-format-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-derivefmt
            ~/.cargo/bin/cargo-sort
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: ${{ steps.cache-format-tools.outputs.cache-primary-key }}

      - name: Run format check
        run: cargo make format-check

  linux-lint:
    name: Linux Lint
    runs-on: ubuntu-24.04
    needs: format

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-dev

      - name: Restore cargo tools cache
        id: cache-linux-lint-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: cargo-tools-linux-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/build.yml') }}
          restore-keys: |
            cargo-tools-linux-v2-

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-linux-lint-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: ${{ steps.cache-linux-lint-tools.outputs.cache-primary-key }}

      - name: Run lint
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make lint

  windows-lint:
    name: Windows Lint
    runs-on: windows-latest
    needs: format

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-dev

      - name: Restore cargo tools cache
        id: cache-windows-lint-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: cargo-tools-windows-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/build.yml', '.github/actions/setup-vcpkg/action.yml') }}
          restore-keys: |
            cargo-tools-windows-v2-

      - name: Install cargo-make
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-make -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-make
          }

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-windows-lint-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: ${{ steps.cache-windows-lint-tools.outputs.cache-primary-key }}

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Run lint
        run: cargo make lint

  doc:
    name: Docs
    runs-on: ubuntu-24.04
    needs:
      - linux-lint
      - windows-lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Restore cargo tools cache
        id: cache-doc-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: cargo-tools-linux-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/build.yml') }}
          restore-keys: |
            cargo-tools-linux-v2-

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-doc-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: ${{ steps.cache-doc-tools.outputs.cache-primary-key }}

      - name: Build docs
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make doc

  linux-test:
    name: Linux Test
    runs-on: ubuntu-24.04
    needs: doc

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-dev

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          extra-packages: xvfb

      - name: Run tests
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: xvfb-run -a -s "-screen 0 1920x1080x24" cargo test --locked --workspace

  windows-test:
    name: Windows Test
    runs-on: windows-latest
    needs: doc

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-dev

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Run tests
        run: cargo test --locked --workspace --features run/windows-bin

  appimage:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    needs:
      - linux-test
      - windows-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-release

      - name: Restore cargo tools cache
        id: cache-appimage-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/dump_syms
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: package-cargo-tools-linux-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/build.yml') }}
          restore-keys: |
            package-cargo-tools-linux-v2-

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Install dump_syms
        run: |
          if ! command -v dump_syms >/dev/null 2>&1; then
            cargo install --locked dump_syms
          fi

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-appimage-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/dump_syms
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: ${{ steps.cache-appimage-tools.outputs.cache-primary-key }}

      - name: Build unsigned AppImage
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make appimage-nosign

  windows-archive:
    name: Windows Archive
    runs-on: windows-latest
    needs:
      - linux-test
      - windows-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release

      - name: Restore cargo tools cache
        id: cache-windows-archive-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: package-cargo-tools-windows-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/build.yml', '.github/workflows/release.yml', '.github/actions/setup-vcpkg/action.yml') }}
          restore-keys: |
            package-cargo-tools-windows-v2-

      - name: Install cargo-make
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-make -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-make
          }

      - name: Install dump_syms
        shell: pwsh
        run: |
          if (-not (Get-Command dump_syms -ErrorAction SilentlyContinue)) {
            cargo install --locked dump_syms
          }

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-windows-archive-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: ${{ steps.cache-windows-archive-tools.outputs.cache-primary-key }}

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Build unsigned archive
        run: cargo make archive-nosign

  windows-installer:
    name: Windows Installer
    runs-on: windows-latest
    needs:
      - linux-test
      - windows-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows x86 target
        run: rustup target add i686-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release

      - name: Restore cargo tools cache
        id: cache-windows-installer-tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: package-cargo-tools-windows-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/build.yml', '.github/workflows/release.yml', '.github/actions/setup-vcpkg/action.yml') }}
          restore-keys: |
            package-cargo-tools-windows-v2-

      - name: Install cargo-make
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-make -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-make
          }

      - name: Install dump_syms
        shell: pwsh
        run: |
          if (-not (Get-Command dump_syms -ErrorAction SilentlyContinue)) {
            cargo install --locked dump_syms
          }

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-windows-installer-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: ${{ steps.cache-windows-installer-tools.outputs.cache-primary-key }}

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Build unsigned installer
        run: cargo make installer-nosign
