name: Release Symbols

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-symbols:
    name: Linux Symbols
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Restore cargo tools cache
        id: cache-linux-symbols-tools
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/dump_syms
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: release-cargo-tools-linux-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/release.yml') }}
          restore-keys: |
            release-cargo-tools-linux-v2-

      - name: Install Linux release dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Install dump_syms
        run: |
          if ! command -v dump_syms >/dev/null 2>&1; then
            cargo install --locked dump_syms
          fi

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-linux-symbols-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/dump_syms
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: ${{ steps.cache-linux-symbols-tools.outputs.cache-primary-key }}

      - name: Install sentry-cli
        run: npm install --global @sentry/cli

      - name: Build release symbols
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make release-symbols

      - name: Upload Linux symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL: ${{ vars.SENTRY_URL || 'https://sentry.io/' }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "Skipping Sentry upload: missing SENTRY_AUTH_TOKEN, SENTRY_ORG, or SENTRY_PROJECT."
            exit 0
          fi
          sentry-cli debug-files upload --wait target/symbols

  windows-symbols:
    name: Windows Symbols
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Restore cargo tools cache
        id: cache-windows-symbols-tools
        uses: actions/cache/restore@v4
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: release-cargo-tools-windows-v2-${{ hashFiles('rust-toolchain.toml', 'Makefile.toml', '.github/workflows/release.yml', '.github/actions/setup-vcpkg/action.yml') }}
          restore-keys: |
            release-cargo-tools-windows-v2-

      - name: Install cargo-make
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-make -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-make
          }

      - name: Install dump_syms
        shell: pwsh
        run: |
          if (-not (Get-Command dump_syms -ErrorAction SilentlyContinue)) {
            cargo install --locked dump_syms
          }

      - name: Save cargo tools cache
        if: ${{ success() && steps.cache-windows-symbols-tools.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: ${{ steps.cache-windows-symbols-tools.outputs.cache-primary-key }}

      - name: Setup vcpkg with OpenCV
        uses: ./.github/actions/setup-vcpkg

      - name: Install sentry-cli
        shell: pwsh
        run: npm install --global @sentry/cli

      - name: Build release symbols
        run: cargo make release-symbols

      - name: Upload Windows symbols to Sentry
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL: ${{ vars.SENTRY_URL || 'https://sentry.io/' }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SENTRY_AUTH_TOKEN) -or [string]::IsNullOrWhiteSpace($env:SENTRY_ORG) -or [string]::IsNullOrWhiteSpace($env:SENTRY_PROJECT)) {
            Write-Host "Skipping Sentry upload: missing SENTRY_AUTH_TOKEN, SENTRY_ORG, or SENTRY_PROJECT."
            exit 0
          }
          sentry-cli debug-files upload --wait target/symbols target/release
