name: Release Symbols

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-symbols:
    name: Linux Symbols
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/dump_syms
            ~/.cargo/bin/minidump-stackwalk
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: release-cargo-tools-linux-v1-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            release-cargo-tools-linux-

      - name: Install Linux release dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            libasound2-dev \
            libcairo2-dev \
            libclang-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libgraphene-1.0-dev \
            libgtk-4-dev \
            libnotify-dev \
            libopencv-dev \
            libpango1.0-dev \
            libssl-dev \
            libstdc++-12-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-randr0-dev \
            libxdo-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxtst-dev \
            llvm-dev \
            mold \
            pkg-config

      - name: Install cargo-make
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi

      - name: Install dump_syms
        run: |
          if ! command -v dump_syms >/dev/null 2>&1; then
            cargo install --locked dump_syms
          fi

      - name: Install minidump-stackwalk
        run: |
          if ! command -v minidump-stackwalk >/dev/null 2>&1; then
            cargo install --locked minidump-stackwalk
          fi

      - name: Install sentry-cli
        run: npm install --global @sentry/cli

      - name: Build release symbols
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo make release-symbols

      - name: Upload Linux symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL: ${{ vars.SENTRY_URL || 'https://sentry.io/' }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "Skipping Sentry upload: missing SENTRY_AUTH_TOKEN, SENTRY_ORG, or SENTRY_PROJECT."
            exit 0
          fi
          sentry-cli debug-files upload --wait target/symbols

  windows-symbols:
    name: Windows Symbols
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\cargo-make.exe
            ~\.cargo\bin\dump_syms.exe
            ~\.cargo\.crates2.json
            ~\.cargo\.crates.toml
          key: release-cargo-tools-windows-v1-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            release-cargo-tools-windows-

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg-downloads
            ${{ github.workspace }}\vcpkg-bincache
          key: vcpkg-windows-release-v1-${{ hashFiles('.github/workflows/build.yml', '.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-windows-release-
            vcpkg-windows-

      - name: Install cargo-make
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-make -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-make
          }

      - name: Install dump_syms
        shell: pwsh
        run: |
          if (-not (Get-Command dump_syms -ErrorAction SilentlyContinue)) {
            cargo install --locked dump_syms
          }

      - name: Install OpenCV with vcpkg
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-bincache,readwrite
          VCPKG_DOWNLOADS: ${{ github.workspace }}\vcpkg-downloads
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP vcpkg
          git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          & (Join-Path $vcpkgRoot bootstrap-vcpkg.bat)
          & (Join-Path $vcpkgRoot vcpkg.exe) install opencv4:x64-windows
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DOWNLOADS=$env:VCPKG_DOWNLOADS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENCV_VCPKG_NAME=opencv4" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $vcpkgRoot installed/x64-windows/bin) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install sentry-cli
        shell: pwsh
        run: npm install --global @sentry/cli

      - name: Build release symbols
        run: cargo make release-symbols

      - name: Upload Windows symbols to Sentry
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL: ${{ vars.SENTRY_URL || 'https://sentry.io/' }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SENTRY_AUTH_TOKEN) -or [string]::IsNullOrWhiteSpace($env:SENTRY_ORG) -or [string]::IsNullOrWhiteSpace($env:SENTRY_PROJECT)) {
            Write-Host "Skipping Sentry upload: missing SENTRY_AUTH_TOKEN, SENTRY_ORG, or SENTRY_PROJECT."
            exit 0
          }
          sentry-cli debug-files upload --wait target/symbols target/release
