[workspace]
resolver = "3"
members = ["actiona-ng", "actiona-ng-cli", "doc-generator", "macros"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Jonathan Mercier-Ganady"]
description = "Cross-platform desktop automation tool"
documentation = "https://actiona.tools"
license = "MIT"

[workspace.dependencies]
arboard = "3.6.1"
async-compat = "0.2.5"
bimap = "0.6.3"
bytes = "1.10.1"
chrono = "0.4.42"
clap = { version = "4.5.47", features = ["cargo", "derive"] }
console = "0.16.1"
convert_case = "0.8.0"
derive-where = "1.6.0"
derive_more = { version = "2.0.1", default-features = false, features = [
    "add",
    "add_assign",
    "mul",
    "mul_assign",
    "not",
    "display",
    "deref",
    "deref_mut",
    "from",
    "into",
    "constructor",
] }
display-info = "0.5.6"
encoding_rs = "0.8.35"
enigo = { git = "https://github.com/enigo-rs/enigo.git", rev = "17fc1d5d3d2319fb23b5dffee1bf347b42b40ce4" }
env_logger = "0.11.8"
eyre = "0.6.12"
futures = "0.3.31"
futures-util = "0.3.31"
http-body = "1.0.1"
http-body-util = "0.1.3"
human-units = { version = "0.5.3", features = ["si-units"] }
humansize = "2.1.3"
humantime = "2.3.0"
image = { version = "0.25.8", default-features = false, features = [
    "png",
    "jpeg",
    "bmp",
    "gif",
    "tga",
    "tiff",
    "webp",
] }
imageproc = { version = "0.25.0", default-features = false, features = [
    "rayon",
] }
indexmap = { version = "2.11.3", features = ["serde"] }
indicatif = "0.18.0"
infer = "0.19.0"
ipnet = "2.11.0"
itertools = "0.14.0"
log = "0.4.28"
mime = "0.3.17"
mime_guess = "2.0.5"
noiselib = "0.2.4"
num-traits = "0.2.19"
once_cell = "1.21.3"
opencv = { version = "0.96.0", default-features = false, features = [
    "imgproc",
] }
quote = "1.0.40"
rand = "0.9.2"
rand_chacha = "0.9.0"
rayon = "1.11.0"
regex = "1.11.2"
reqwest = { version = "0.12.23", features = ["stream", "multipart"] }
rquickjs = { git = "https://github.com/Jmgr/rquickjs.git", branch = "add-filename-to-eval-options", default-features = false, features = [
    "macro",
    "futures",
    "parallel",
    "indexmap",
] }
rquickjs-serde = { git = "https://github.com/Jmgr/rquickjs-serde.git", branch = "tmp-update-deps" }
rustdoc-types = "0.56.0"
serde = "1.0.225"
serde-name = "0.2.1"
serde_json = "1.0.145"
serde_plain = "1.0.2"
slotmap = { version = "1.0.7", features = ["serde"] }
strum = { version = "0.27.2", features = ["derive"] }
swc_common = { version = "15.0.0", features = ["tty-emitter", "sourcemap"] }
swc_ecma_ast = "16.0.0"
swc_ecma_codegen = "18.0.0"
swc_ecma_parser = "25.0.0"
swc_ecma_transforms_base = "28.0.1"
swc_ecma_transforms_typescript = "31.0.0"
swc_sourcemap = "9.3.4"
syn = { version = "2.0", features = ["parsing"] }
sysinfo = "0.37.0"
tauri = { version = "2.8.5", default-features = false, features = [
    "wry",
    "common-controls-v6",
    "x11",
] }
tauri-plugin-dialog = "2.4.0"
tauri-runtime-wry = "2.8.1"
thiserror = "2.0.16"
tokio = { version = "1.47.1", features = [
    "rt-multi-thread",
    "signal",
    "macros",
    "time",
    "process",
    "sync",
    "fs",
    "io-util",
] }
tokio-util = { version = "0.7.16", features = ["rt"] }
tracing = "0.1.41"
tween = "2.1.0"
wildmatch = "2.5.0"

# Windows
pe-parser = "0.7.0"
windows = { version = "0.62.0", features = [
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_Threading",
    "Win32_System_LibraryLoader",
    "Win32_Graphics_Gdi",
    "Win32_System_Memory",
    "Win32_System_StationsAndDesktops",
    "Win32_Security",
] }
windows-result = "0.4.0"

# Unix
libwmctl = "0.0.51"
memfd = "0.6.5"
nix = { version = "0.30.1", features = ["poll", "mman"] }
procfs = { version = "0.18.0", default-features = false, features = ["flate2"] }
rustix = { version = "1.1.2", default-features = false, features = ["process"] }
x11rb = "0.13.2"
x11rb-async = { version = "0.13.2", features = [
    "xinput",
    "randr",
    "shm",
    "extra-traits",
    "xkb",
    "allow-unsafe-code",
] }
xkeysym = "0.2.1"
zbus = { version = "5.11.0", default-features = false, features = ["tokio"] }
xkbcommon = { version = "0.9.0", default-features = false, features = ["x11"] }

# Dev dependencies
askama = "0.14.0"
base64 = "0.22.1"
bon = "3.8.1"
console-subscriber = "0.4.1"
httptest = "0.16.3"
libtest-mimic-collect = { path = "../libtest-mimic-collect" }
pretty_assertions = "1.4.1"
rstest = "0.26.1"
tempfile = "3.22.0"
tracing-subscriber = { version = "0.3.20", features = [
    "fmt",
    "env-filter",
    "registry",
] }
tracing-test = "0.2.5"

# Build dependencies
built = "0.8.0"
cfg_aliases = "0.2.1"
tauri-build = "2.4.1"

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
lto = false
