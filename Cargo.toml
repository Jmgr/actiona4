[workspace]
resolver = "3"
members = ["code", "code-runner", "code-macros", "doc-generator"]

[workspace.dependencies]
eyre = "0.6"
ciborium = "0.2"
clap = { version = "4.5", features = ["cargo", "derive"] }
serde = "1.0"
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.43", features = ["rt-multi-thread"] }
tokio-util = { version = "0.7", features = ["rt"] }
slint = { version = "1.10", default-features = false, features = [
    "compat-1-2",
    "accessibility",
    "renderer-software",
    "std",
    "backend-winit-x11",
] }
slint-interpreter = { version = "1.10", default-features = false, features = [
    "compat-1-2",
    "accessibility",
    "renderer-software",
    "std",
    "backend-winit-x11",
] }
rquickjs = { version = "0.9", default-features = false, features = ["macro"] }
itertools = "0.14.0"
convert_case = "0.8"

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
