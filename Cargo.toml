rustyline = "18.0.1"
sadness-generator = "0.7.0"
satint = "0.3.2"
sentry = "0.48.5"
sentry-rust-minidump = "0.16.0"
serde = "1.0.228"
serde_json = "1.0.150"
serde_plain = "1.0.2"
sha2 = "0.11.0"
shell-words = "1.1.1"
slotmap = "1.1.1"
