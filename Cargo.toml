open = "5.4.0"
opencv = { version = "0.99.0", default-features = false }
parking_lot = "0.12.5"
postcard = "1.1.3"
proc-macro2 = "1.0.106"
quote = "1.0.46"
rand = "0.10.2"
rand_chacha = "0.10.0"
rayon = "1.12.0"
regex = "1.13.1"
reqwest = { version = "0.13.4", default-features = false }
rfd = "0.17.2"
rodio = { version = "0.22.2", default-features = false }
rquickjs = { version = "0.12.1", default-features = false }
rquickjs-serde = "0.6.1"
rusqlite = "0.40.1"
rusqlite_migration = "2.6.0"
rustdoc-types = "0.60.0"
