[workspace]
resolver = "3"
members = ["actiona-ng", "actiona-ng-cli", "macros", "doc-generator"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Jonathan Mercier-Ganady"]
description = "Cross-platform desktop automation tool"
documentation = "https://actiona.tools"

[workspace.dependencies]
async-compat = "0.2"
ciborium = "0.2"
clap = { version = "4.5", features = ["cargo", "derive"] }
console = "0.15"
convert_case = "0.8"
derive_more = { version = "2.0", features = ["add", "mul"] }
display-info = "0.5"
enigo = "0.3"
env_logger = "0.11"
eyre = "0.6"
humantime = "2.2"
image = "0.25"
imageproc = "0.25"
indexmap = { version = "2.9", features = ["serde"] }
itertools = "0.14.0"
log = "0.4"
noiselib = "0.2"
num-traits = "0.2"
once_cell = "1.21"
opencv = { version = "0.94", default-features = false, features = ["imgproc"] }
quote = "1.0"
rand = "0.9"
rayon = "1.10"
regex = "1.11"
rquickjs = { version = "0.9", default-features = false, features = ["macro"] }
rustdoc-types = "0.39"
serde = "1.0"
serde_json = "1.0"
slotmap = { version = "1.0.7", features = ["serde"] }
slint = { version = "1.10", default-features = false, features = [
    "compat-1-2",
    "accessibility",
    "renderer-software",
    "std",
    "backend-winit-x11",
] }
slint-interpreter = { version = "1.10", default-features = false, features = [
    "compat-1-2",
    "accessibility",
    "renderer-software",
    "std",
    "backend-winit-x11",
] }
sourcemap = "9.1"
strum = { version = "0.27", features = ["derive"] }
swc_common = { version = "8.1.0", features = ["tty-emitter", "sourcemap"] }
swc_ecma_ast = "8.1.2"
swc_ecma_codegen = "10.0.0"
swc_ecma_parser = "11.1.2"
swc_ecma_transforms_base = "12.2.0"
swc_ecma_transforms_typescript = "13.0.0"
syn = { version = "2.0", features = ["parsing"] }
thiserror = "2.0"
tokio = { version = "1.44", features = [
    "rt-multi-thread",
    "signal",
    "macros",
    "time",
    "process",
    "sync",
] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tween = "2.0"
wildmatch = "2.4"

# Windows
windows = { version = "0.61", features = [
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_Threading",
    "Win32_System_LibraryLoader",
    "Win32_Graphics_Gdi",
    "Win32_System_Memory",
] }

# Unix
memfd = "0.6"
nix = { version = "0.29", features = ["poll", "mman"] }
x11rb-async = { version = "0.13", features = [
    "xinput",
    "randr",
    "shm",
    "extra-traits",
] }
zbus = "5.5"

# Dev dependencies
pretty_assertions = "1.4"
tempfile = "3.19"
tracing-test = "0.2"

# Build dependencies
built = "0.7"

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
