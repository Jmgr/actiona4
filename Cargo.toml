# Build dependencies
built = "0.8.1"
cfg_aliases = "0.2.2"
embed-resource = "3.0.11"

[patch.crates-io]
enigo = { git = "https://github.com/enigo-rs/enigo", rev = "17fc1d5" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
debug = true # needed for dump_syms to produce useful symbols
panic = "abort"

[profile.bench]
inherits = "release"

[profile.dev]
lto = false
debug = true
opt-level = 0
