[workspace]
resolver = "3"
members = [
    "crates/action-definition",
    "crates/action-execution",
    "crates/build-support",
    "crates/common",
    "crates/config",
    "crates/core",
    "crates/doc-generator",
    "crates/e2e",
    "crates/extension",
    "crates/extensions/selection",
    "crates/file-format",
    "crates/inno-plugin",
    "crates/installer-tools",
    "crates/macros",
    "crates/run",
    "crates/screenshot",
    "crates/types",
    "crates/updater",
    "crates/xtask",
]

[workspace.package]
version = "0.2.0"
edition = "2024"
authors = ["Jonathan Mercier-Ganady"]
description = "Cross-platform desktop automation tool"
documentation = "https://actiona.app"
license = "MIT"
repository = "https://github.com/Jmgr/actiona4"
readme = "README.md"
keywords = ["automation", "desktop", "macros"]
categories = ["accessibility", "development-tools", "os"]

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }

as_conversions = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
doc_markdown = "allow"
enum_glob_use = "allow"
fn_params_excessive_bools = "allow"
future_not_send = "allow"
ignore_without_reason = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
multiple_crate_versions = "allow"
option_if_let_else = "allow"
or_fun_call = "allow"
redundant_closure_for_method_calls = "allow"
significant_drop_tightening = "allow"
struct_excessive_bools = "allow"
too_long_first_doc_paragraph = "allow"
too_many_arguments = "allow"
too_many_lines = "allow"

absolute_paths = "warn"
as_pointer_underscore = "warn"
as_underscore = "warn"
cast_lossless = "warn"
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
dbg_macro = "warn"
empty_drop = "warn"
empty_enum_variants_with_brackets = "warn"
empty_structs_with_brackets = "warn"
float_cmp = "warn"
fn_to_numeric_cast_any = "warn"
large_include_file = "warn"
lossy_float_literal = "warn"
mem_forget = "warn"
mixed_read_write_in_expression = "warn"
must_use_candidate = "warn"
mutex_atomic = "warn"
mutex_integer = "warn"
needless_raw_strings = "warn"
panic_in_result_fn = "warn"
pub_without_shorthand = "warn"
rc_buffer = "warn"
rc_mutex = "warn"
redundant_test_prefix = "warn"
redundant_type_annotations = "warn"
ref_patterns = "warn"
renamed_function_params = "warn"
rest_pat_in_fully_bound_structs = "warn"
return_and_then = "warn"
same_name_method = "warn"
self_named_module_files = "warn"
str_to_string = "warn"
string_add = "warn"
string_lit_chars_any = "warn"
string_slice = "warn"
suspicious_xor_used_as_pow = "warn"
tests_outside_test_module = "warn"
todo = "warn"
undocumented_unsafe_blocks = "warn"
unimplemented = "warn"
unnecessary_safety_comment = "warn"
unnecessary_safety_doc = "warn"
unneeded_field_pattern = "warn"
unseparated_literal_suffix = "warn"
unused_result_ok = "warn"
unwrap_used = "warn"
verbose_file_reads = "warn"

[workspace.lints.rustdoc]
invalid_html_tags = "allow"

[workspace.dependencies]
ab_glyph = "0.2.32"
arboard = "3.6.1"
arc-swap = "1.9.2"
async-stream = "0.3.6"
bimap = "0.6.3"
bytemuck = "1.25.1"
bytes = "1.12.1"
chrono = { version = "0.4.45", default-features = false }
clap = "4.6.2"
clap_complete = "4.6.7"
color-eyre = "0.6.5"
console = "0.16.4"
const-default = "1.0.0"
const_format = "0.2.36"
convert_case = "0.11.0"
darling = "0.23.0"
derive-where = "1.6.1"
derive_more = { version = "2.1.1", default-features = false }
dialoguer = { version = "0.12.0", default-features = false }
directories = "6.0.0"
display-info = "0.5.9"
encoding_rs = "0.8.35"
enigo = "0.6.1"
env_logger = "0.11.11"
eyre = "0.6.12"
