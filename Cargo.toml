[workspace]
resolver = "3"
members = ["core", "doc-generator", "macros", "run"]

[workspace.package]
version = "0.1.5"
edition = "2024"
authors = ["Jonathan Mercier-Ganady"]
description = "Cross-platform desktop automation tool"
documentation = "https://actiona.app"
license = "MIT"

[workspace.dependencies]
ab_glyph = "0.2.32"
arboard = "3.6.1"
arc-swap = "1.8.2"
bimap = "0.6.3"
bytes = "1.11.1"
chrono = "0.4.44"
clap = { version = "4.5.60", features = ["cargo", "derive"] }
clap_complete = "4.5.66"
color-eyre = "0.6.5"
console = "0.16.2"
convert_case = "0.11.0"
derive-where = "1.6.0"
derive_more = { version = "2.1.1", default-features = false, features = [
    "add",
    "add_assign",
    "mul",
    "mul_assign",
    "not",
    "display",
    "deref",
    "deref_mut",
    "from",
    "into",
    "constructor",
] }
directories = "6.0.0"
display-info = "0.5.7"
encoding_rs = "0.8.35"
enigo = { git = "https://github.com/enigo-rs/enigo.git", rev = "17fc1d5d3d2319fb23b5dffee1bf347b42b40ce4" }
env_logger = "0.11.9"
eyre = "0.6.12"
flate2 = "1.1.9"
futures = "0.3.32"
futures-util = "0.3.32"
http-body = "1.0.1"
http-body-util = "0.1.3"
human-units = { version = "0.5.3", features = ["si-units"] }
humansize = "2.1.3"
humantime = "2.3.0"
image = { version = "0.25.9", default-features = false, features = [
    "png",
    "jpeg",
    "bmp",
    "gif",
    "tga",
    "tiff",
    "webp",
] }
imageproc = { version = "0.26.1", default-features = false, features = [
    "rayon",
    "text",
] }
indexmap = { version = "2.13.0", features = ["serde"] }
indicatif = "0.18.4"
infer = "0.19.0"
ipnet = "2.12.0"
itertools = "0.14.0"
log = "0.4.29"
mime = "0.3.17"
mime_guess = "2.0.5"
noiselib = "0.2.4"
num-traits = "0.2.19"
once_cell = "1.21.3"
open = "5.3.3"
opencv = { version = "0.98.1", default-features = false, features = [
    "imgproc",
] }
parking_lot = "0.12.5"
quote = "1.0.44"
rand = "0.10.0"
rand_chacha = "0.10.0"
rayon = "1.11.0"
regex = "1.12.3"
reqwest = { version = "0.13.2", default-features = false, features = [
    "native-tls",
    "stream",
    "multipart",
    "json",
    "form",
    "query",
] }
rodio = { version = "0.22.1", features = ["tracing", "symphonia"] }
rquickjs = { version = "0.11.0", default-features = false, features = [
    "macro",
    "futures",
    "parallel",
    "indexmap",
] }
rquickjs-serde = { version = "0.5.0" }
rustdoc-types = "0.57.0"
rustyline = { version = "17.0.2", features = ["derive"] }
serde = "1.0.228"
serde-name = "0.2.1"
serde_json = "1.0.149"
serde_plain = "1.0.2"
shell-words = "1.1.1"
slotmap = { version = "1.1.1", features = ["serde"] }
strum = { version = "0.28.0", features = ["derive"] }
swc_common = { version = "19.0.0", features = ["tty-emitter", "sourcemap"] }
swc_ecma_ast = "21.0.0"
swc_ecma_codegen = "24.0.0"
swc_ecma_parser = "35.0.0"
swc_ecma_transforms_base = "38.0.0"
swc_ecma_transforms_typescript = "42.0.0"
swc_sourcemap = "10.0.2"
syn = "2.0.117"
sys-locale = "0.3.2"
sysinfo = "0.38.3"
system_shutdown = { version = "4.1.0" }
tauri = { version = "2.10.2", default-features = false, features = [
    "wry",
    "x11",
    "tray-icon",
] }
tauri-plugin-dialog = "2.6.0"
tauri-runtime-wry = "2.10.0"
thiserror = "2.0.18"
time = { version = "0.3.47", features = ["serde"] }
tokio = { version = "1.50.0", features = [
    "rt-multi-thread",
    "signal",
    "macros",
    "time",
    "process",
    "sync",
    "fs",
    "io-util",
] }
tokio-util = { version = "0.7.18", features = ["rt"] }
toml = "1.0.3"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = [
    "env-filter",
    "fmt",
    "time",
] }
tween = "2.2.0"
two-face = "0.5.1"
unicode-segmentation = "1.12.0"
uuid = { version = "1.21.0", features = ["v4", "serde"] }
versions = { version = "7.0.0", features = ["serde"] }
wildmatch = "2.6.1"

# Windows
pe-parser = "0.7.0"
windows = { version = "0.62.2", features = [
    "Win32_UI_Accessibility",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_DataExchange",
    "Win32_System_Threading",
    "Win32_System_LibraryLoader",
    "Win32_Graphics_Gdi",
    "Win32_System_Memory",
    "Win32_System_StationsAndDesktops",
    "Win32_Security",
] }
windows-result = "0.4.1"

# Notifications
winrt-toast-reborn = "0.3.8"

# Unix
libwmctl = "0.0.51"
memfd = "0.6.5"
memmap2 = "0.9.10"
notify-rust = { version = "4.12.0", default-features = false, features = [
    "z-with-tokio",
    "async",
    "images",
] }
procfs = { version = "0.18.0", default-features = false, features = ["flate2"] }
rustix = { version = "1.1.4", default-features = false, features = ["process"] }
x11rb = "0.13.2"
x11rb-async = { version = "0.13.2", features = [
    "xinput",
    "randr",
    "shm",
    "extra-traits",
    "xkb",
    "allow-unsafe-code",
] }
xkbcommon = { version = "0.9.0", default-features = false, features = ["x11"] }
xkeysym = "0.2.1"
zbus = { version = "5.14.0", default-features = false, features = ["tokio"] }

# Dev dependencies
askama = "0.15.4"
base64 = "0.22.1"
bon = "3.9.0"
console-subscriber = "0.5.0"
httptest = "0.16.4"
libtest-mimic-collect = "0.3.3"
rstest = "0.26.1"
serial_test = "3.4.0"
tempfile = "3.26.0"
tracing-test = "0.2.6"

# Build dependencies
built = "0.8.0"
cfg_aliases = "0.2.1"
tauri-build = "2.5.5"

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
lto = false
debug = 1
opt-level = 0
