zbus = { version = "5.18.0", default-features = false }
zstd = "0.13.3"

# Dev dependencies
assert_cmd = "2.2.2"
base64 = "0.22.1"
console-subscriber = "0.5.0"
criterion = { version = "0.8.2", default-features = false }
fluent-syntax = "0.12.0"
httptest = "0.16.4"
libtest-mimic-collect = "0.4.0"
rstest = "0.26.1"
serial_test = "3.5.0"
tempfile = "3.27.0"
tracing-test = "0.2.6"
