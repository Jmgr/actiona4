[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = "true"

[config]
skip_core_tasks = true
default_to_workspace = false

[tasks.fmt]
command = "cargo"
toolchain = "nightly"
args = ["fmt", "--all"]

[tasks.derivefmt]
command = "cargo"
args = ["derivefmt"]

[tasks.sort]
command = "cargo"
args = ["sort", "-g", "-w"]

[tasks.format]
dependencies = ["deps", "fmt", "derivefmt", "sort"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--all", "--all-targets", "--all-features"]

[tasks.lint]
dependencies = ["clippy"]

[tasks.install-rustfmt]
cwd = "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}"
command = "rustup"
args = ["component", "add", "rustfmt", "--toolchain", "nightly"]

# From https://github.com/dcchut/cargo-derivefmt
# This package is currently implemented using rust-analyzer internals, so cannot be published on crates.io.
[tasks.install-derivefmt]
command = "cargo"
args = [
    "install",
    "--locked",
    "--git",
    "https://github.com/dcchut/cargo-derivefmt",
    "--bin",
    "cargo-derivefmt",
]

[tasks.install-sort]
command = "cargo"
args = ["install", "cargo-sort"]

[tasks.install-tauri-cli]
script_runner = "bash"
script_extension = "sh"
script = [
    "if ! command -v cargo-tauri >/dev/null 2>&1; then cargo install tauri-cli --locked; fi",
]

[tasks.deps]
dependencies = ["install-rustfmt", "install-derivefmt", "install-sort"]

[tasks.doc]
condition = { platforms = ["linux"] }
script_runner = "bash"
script_extension = "sh"
script = ["./scripts/generate_doc.sh"]

[tasks.appimage-run]
condition = { platforms = ["linux"] }
description = "Build an AppImage for the actiona-run executable."
cwd = "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/run"
dependencies = ["install-tauri-cli"]
script_runner = "bash"
script_extension = "sh"
script = ["cargo tauri build --bundles appimage"]

[tasks.release-run]
description = "Build the actiona-run binary in release mode."
command = "cargo"
args = ["build", "-p", "run", "--release", "--bin", "actiona-run"]

[tasks.release-run-console]
condition = { platforms = ["windows"] }
description = "Build the actiona-run-console binary in release mode (Windows only)."
command = "cargo"
args = [
    "build",
    "-p",
    "run",
    "--release",
    "--bin",
    "actiona-run-console",
    "--features",
    "windows-console-bin",
]

[tasks.release]
description = "Build release binaries, including actiona-run-console on Windows."
dependencies = ["release-run", "release-run-console"]

[tasks.sign]
condition = { platforms = ["windows"] }
description = "Sign actiona-run release executables with signtool (Windows only)."
command = "signtool"
args = [
    "sign",
    "/d",
    "Actiona",
    "/du",
    "https://actiona.app",
    "/fd",
    "sha256",
    "/tr",
    "http://timestamp.comodoca.com",
    "/td",
    "sha256",
    "/as",
    "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}\\target\\release\\actiona-run.exe",
    "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}\\target\\release\\actiona-run-console.exe",
]

[tasks.release-signed]
condition = { platforms = ["windows"] }
description = "Build and sign actiona-run release executables (Windows only)."
dependencies = ["release", "sign"]
