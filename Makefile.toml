[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = "true"

[config]
skip_core_tasks = true
default_to_workspace = false

[tasks.fmt]
command = "cargo"
toolchain = "nightly"
args = ["fmt", "--all"]

[tasks.derivefmt]
command = "cargo"
args = ["derivefmt"]

[tasks.sort]
command = "cargo"
args = ["sort", "-g", "-w"]

[tasks.format]
dependencies = ["deps", "fmt", "derivefmt", "sort"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--all", "--all-targets", "--all-features"]

[tasks.lint]
dependencies = ["clippy"]

[tasks.install-rustfmt]
cwd = "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}"
command = "rustup"
args = ["component", "add", "rustfmt", "--toolchain", "nightly"]

# From https://github.com/dcchut/cargo-derivefmt
# This package is currently implemented using rust-analyzer internals, so cannot be published on crates.io.
[tasks.install-derivefmt]
command = "cargo"
args = [
    "install",
    "--locked",
    "--git",
    "https://github.com/dcchut/cargo-derivefmt",
    "--bin",
    "cargo-derivefmt",
]

[tasks.install-sort]
command = "cargo"
args = ["install", "cargo-sort"]

[tasks.install-tauri-cli]
script_runner = "bash"
script_extension = "sh"
script = [
    "if ! command -v cargo-tauri >/dev/null 2>&1; then cargo install tauri-cli --locked; fi",
]

[tasks.deps]
dependencies = ["install-rustfmt", "install-derivefmt", "install-sort"]

[tasks.doc]
condition = { platforms = ["linux"] }
script_runner = "bash"
script_extension = "sh"
script = ["./scripts/generate_doc.sh"]

[tasks.prepare-selection-sidecar]
description = "Build and stage the selection sidecar for Tauri bundling."
cwd = "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/run"
script_runner = "bash"
script_extension = "sh"
script = [
    "set -euo pipefail",
    "target_triple=\"$(rustc -vV | sed -n 's/^host: //p')\"",
    "extension=''",
    "case \"$target_triple\" in *windows*) extension='.exe' ;; esac",
    "cargo build -p selection --release --target \"$target_triple\"",
    "mkdir -p binaries",
    "cp \"../target/$target_triple/release/selection$extension\" \"binaries/selection-$target_triple$extension\"",
]

[tasks.appimage-run]
condition = { platforms = ["linux"] }
description = "Build an AppImage for the actiona-run executable."
cwd = "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/run"
dependencies = ["install-tauri-cli", "prepare-selection-sidecar"]
script_runner = "bash"
script_extension = "sh"
script = [
    "TAURI_CONFIG='{\"bundle\":{\"externalBin\":[\"binaries/selection\"]}}' cargo tauri build --bundles appimage",
]

[tasks.bundle-run]
condition = { platforms = ["windows"] }
description = "Build the Windows bundle for actiona-run, including the selection sidecar."
cwd = "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/run"
dependencies = ["install-tauri-cli", "prepare-selection-sidecar"]
script_runner = "bash"
script_extension = "sh"
script = [
    "TAURI_CONFIG='{\"bundle\":{\"externalBin\":[\"binaries/selection\"]}}' cargo tauri build",
]

[tasks.release-run]
description = "Build the actiona-run binary in release mode."
command = "cargo"
args = ["build", "-p", "run", "--release", "--bin", "actiona-run"]

[tasks.release-runw]
condition = { platforms = ["windows"] }
description = "Build the actiona-runw binary in release mode (Windows only)."
command = "cargo"
args = [
    "build",
    "-p",
    "run",
    "--release",
    "--bin",
    "actiona-runw",
    "--features",
    "windows-bin",
]

[tasks.release]
description = "Build release binaries, including actiona-runw on Windows."
dependencies = ["release-run", "release-runw"]

[tasks.sign]
condition = { platforms = ["windows"] }
description = "Sign actiona-run release executables with signtool (Windows only)."
command = "signtool"
args = [
    "sign",
    "/v",
    "/d",
    "Actiona",
    "/du",
    "https://actiona.app",
    "/fd",
    "sha256",
    "/sha1",
    "77DCCEE2A1B432AA2E361B49C620C85D994AB6D3",
    "/tr",
    "http://timestamp.sectigo.com",
    "/td",
    "sha256",
    "/as",
    "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}\\target\\release\\actiona-run.exe",
    "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}\\target\\release\\actiona-runw.exe",
]

[tasks.release-signed]
condition = { platforms = ["windows"] }
description = "Build and sign actiona-run release executables (Windows only)."
dependencies = ["release", "sign"]
