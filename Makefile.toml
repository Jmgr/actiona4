[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = "true"

[config]
skip_core_tasks = true
default_to_workspace = false

[tasks.fmt]
command = "cargo"
toolchain = "nightly"
args = ["fmt", "--all"]

[tasks.derivefmt]
command = "cargo"
args = ["derivefmt"]

[tasks.sort]
command = "cargo"
args = ["sort", "-g", "-w"]

[tasks.format]
dependencies = ["deps", "fmt", "derivefmt", "sort"]

[tasks.fmt-check]
command = "cargo"
toolchain = "nightly"
args = ["fmt", "--all", "--check"]

[tasks.derivefmt-check]
script_runner = "@shell"
script = '''
set -e
cargo derivefmt
git diff --exit-code -- '*.rs'
'''

[tasks.derivefmt-check.windows]
script_runner = "@shell"
script = '''
cargo derivefmt
if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
git diff --exit-code -- *.rs
'''

[tasks.sort-check]
command = "cargo"
args = ["sort", "-g", "-w", "--check", "--check-format"]

[tasks.format-check]
dependencies = ["deps", "fmt-check", "derivefmt-check", "sort-check"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--all", "--all-targets", "--all-features"]

[tasks.install-e2e-ts-deps]
script_runner = "@shell"
script = '''
if [ ! -x crates/e2e/node_modules/.bin/tsc ]; then
    npm ci --prefix crates/e2e
fi
'''

[tasks.install-e2e-ts-deps.windows]
script_runner = "@shell"
script = '''
if not exist crates\\e2e\\node_modules\\.bin\\tsc.cmd (
    npm ci --prefix crates/e2e
)
'''

[tasks.lint-ts]
dependencies = ["install-e2e-ts-deps"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "lint-ts"]

[tasks.build-actiona-run]
description = "Build the actiona-run binary (required before running e2e tests)."
command = "cargo"
args = ["build", "-p", "run"]

[tasks.build-actiona-run.windows]
args = ["build", "-p", "run", "--features", "run/windows-bin"]

[tasks.e2e]
description = "Build actiona-run then run end-to-end TypeScript API tests."
dependencies = ["build-actiona-run"]
command = "cargo"
args = ["test", "-p", "e2e"]

[tasks.lint]
dependencies = ["clippy", "lint-ts"]

[tasks.install-rustfmt]
cwd = "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}"
command = "rustup"
args = ["component", "add", "rustfmt", "--toolchain", "nightly"]

# From https://github.com/dcchut/cargo-derivefmt
# This package is currently implemented using rust-analyzer internals, so cannot be published on crates.io.
[tasks.install-derivefmt]
script_runner = "@shell"
script = '''
if ! command -v cargo-derivefmt >/dev/null 2>&1; then
    cargo install --locked --git https://github.com/dcchut/cargo-derivefmt --bin cargo-derivefmt
fi
'''

[tasks.install-derivefmt.windows]
script_runner = "@shell"
script = '''
where cargo-derivefmt >NUL 2>NUL
if %ERRORLEVEL% NEQ 0 (
    cargo install --locked --git https://github.com/dcchut/cargo-derivefmt --bin cargo-derivefmt
)
'''

[tasks.install-sort]
script_runner = "@shell"
script = '''
if ! command -v cargo-sort >/dev/null 2>&1; then
    cargo install --locked cargo-sort
fi
'''

[tasks.install-sort.windows]
script_runner = "@shell"
script = '''
where cargo-sort >NUL 2>NUL
if %ERRORLEVEL% NEQ 0 (
    cargo install --locked cargo-sort
)
'''

[tasks.install-cargo-edit]
command = "cargo"
args = ["install", "cargo-edit"]

[tasks.deps]
dependencies = ["install-rustfmt", "install-derivefmt", "install-sort"]

[tasks.doc]
condition = { platforms = ["linux"] }
dependencies = ["install-e2e-ts-deps"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "doc"]

[tasks.upgrade]
description = "Upgrade dependencies, including incompatible semver updates."
dependencies = ["install-cargo-edit"]
command = "cargo"
args = ["upgrade", "--incompatible"]

[tasks.appimage]
condition = { platforms = ["linux"] }
description = "Build a signed AppImage for the actiona-run executable."
dependencies = ["release-symbols"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "app-image"]

[tasks.appimage-nosign]
condition = { platforms = ["linux"] }
description = "Build an unsigned AppImage for the actiona-run executable."
dependencies = ["release-symbols"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "app-image-no-sign"]

[tasks.release-runw]
condition = { platforms = ["windows"] }
description = "Build the actiona-runw binary in release mode (Windows only)."
command = "cargo"
args = [
    "build",
    "-p",
    "run",
    "--release",
    "--bin",
    "actiona-runw",
    "--features",
    "windows-bin",
]

[tasks.release]
description = "Build release binaries, including selection-tool and actiona-runw on Windows."
dependencies = ["release-runw"]
command = "cargo"
args = [
    "build",
    "-p",
    "run",
    "-p",
    "selection-tool",
    "--release",
]

[tasks.symbols]
description = "Generate Breakpad symbol files (.sym) and strip release binaries."
command = "cargo"
args = ["run", "-p", "xtask", "--", "symbols"]

[tasks.release-symbols]
description = "Build all release binaries and generate Breakpad symbol files."
dependencies = ["release", "symbols"]

[tasks.upload-symbols]
description = "Build release binaries, generate Breakpad symbol files, and upload them to Sentry using sentry-cli."
dependencies = ["release-symbols"]
command = "sentry-cli"
args = ["debug-files", "upload", "--project", "actiona-run", "--wait", "target/symbols"]

[tasks.symbolicate]
description = "Symbolicate a minidump. Usage: cargo make symbolicate <path/to/dump.dmp>"
command = "cargo"
args = ["run", "-p", "xtask", "--", "symbolicate", "${@}"]

[tasks.sign]
condition = { platforms = ["windows"] }
description = "Sign packaged Windows release binaries with signtool (Windows only)."
dependencies = ["build-inno-plugin"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "sign-binaries"]

[tasks.release-signed]
condition = { platforms = ["windows"] }
description = "Build and sign actiona-run release executables (Windows only)."
dependencies = ["release", "sign"]

[tasks.build-inno-plugin]
condition = { platforms = ["windows"] }
description = "Build the Inno Setup plugin DLL as 32-bit for the installer (Windows only)."
command = "cargo"
args = ["build", "-p", "inno-plugin", "--release", "--target", "i686-pc-windows-msvc"]

[tasks.installer]
condition = { platforms = ["windows"] }
description = "Build the signed Actiona Run installer with Inno Setup (Windows only)."
dependencies = ["release-symbols", "sign"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "installer"]

[tasks.installer-nosign]
condition = { platforms = ["windows"] }
description = "Build the unsigned Actiona Run installer with Inno Setup (Windows only)."
dependencies = ["release-symbols", "build-inno-plugin"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "installer-no-sign"]

[tasks.archive]
condition = { platforms = ["windows"] }
description = "Build a signed Actiona Run zip archive (Windows only)."
dependencies = ["release-symbols", "sign"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "archive"]

[tasks.archive-nosign]
condition = { platforms = ["windows"] }
description = "Build an unsigned Actiona Run zip archive (Windows only)."
dependencies = ["release-symbols"]
command = "cargo"
args = ["run", "-p", "xtask", "--", "archive-no-sign"]
