<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark light">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            background: transparent;
        }

        img {
            max-width: 100vw;
            max-height: 100vh;
            image-rendering: auto;
        }
    </style>
    <title>{{ title }}</title>
</head>

<body>
    <img src="{{ data_url }}" alt="{{ alt }}">
</body>

</html>
